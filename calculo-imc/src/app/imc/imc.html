<div class="container">
  <h1>Calculadora IMC</h1>

<!-- Inputs de peso e alture -->
  <h3>Peso:</h3>
  <input type="number" [(ngModel)]="peso" placeholder="Peso(Kg) ex:80">
  <h3>Altura:</h3>
  <input type="number" [(ngModel)]="altura" placeholder="Altura(M) ex:1.75">

<!-- Botão calcular que ativa a função -->
  <button (click)="CalculoIMC()">Calcular</button>

<!-- Mostra o IMC e a situação que a função TS -->
  <div *ngIf="imc > 0">
    <p>Seu IMC: {{ imc.toFixed(2) }}</p>
    <p>Situação: <strong>{{ resultado }}</strong></p>
  </div>
</div>
